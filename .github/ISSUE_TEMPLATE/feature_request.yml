name: Feature request
description: Propose a new capability or UI change
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What's the use case this would solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior or admin UX
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
