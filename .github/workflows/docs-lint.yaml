name: docs-lint

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'bin/docs-lint'
  pull_request:
    paths:
      - 'docs/**'
      - 'bin/docs-lint'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - run: bin/docs-lint
